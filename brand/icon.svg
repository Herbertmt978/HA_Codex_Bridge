<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Codex Bridge icon</title>
  <desc id="desc">A cyan and blue protected code portal above three bridge lines.</desc>
  <defs>
    <linearGradient id="panel" x1="24" y1="18" x2="232" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102B42"/>
      <stop offset="1" stop-color="#081827"/>
    </linearGradient>
    <linearGradient id="left" x1="52" y1="55" x2="112" y2="203" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35D6F4"/>
      <stop offset="1" stop-color="#18BCF2"/>
    </linearGradient>
    <linearGradient id="right" x1="144" y1="52" x2="204" y2="203" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8290FF"/>
      <stop offset="1" stop-color="#5B6CFF"/>
    </linearGradient>
    <linearGradient id="bridge" x1="99" y1="0" x2="157" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18BCF2"/>
      <stop offset="1" stop-color="#5B6CFF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" values="1 0 0 0 0.08 0 1 0 0 0.74 0 0 1 0 0.95 0 0 0 .22 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#panel)"/>
  <rect x="8.75" y="8.75" width="238.5" height="238.5" rx="55.25" fill="none" stroke="#B9ECFF" stroke-opacity=".16" stroke-width="1.5"/>
  <path d="M110 48 52 88v76l58 40v-33l-31-21v-48l31-21V48Z" fill="url(#left)" filter="url(#glow)"/>
  <path d="m146 48 58 40v76l-58 40v-33l31-21v-48l-31-21V48Z" fill="url(#right)" filter="url(#glow)"/>
  <rect x="121" y="110" width="14" height="14" rx="4" fill="#F5F8FA"/>
  <path d="M119 143h18M111 157h34M101 172h54" fill="none" stroke="url(#bridge)" stroke-width="7" stroke-linecap="round"/>
  <circle cx="128" cy="117" r="20" fill="none" stroke="#F5F8FA" stroke-opacity=".12"/>
</svg>
