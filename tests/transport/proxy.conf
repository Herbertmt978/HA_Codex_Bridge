worker_processes 1;

events {
    worker_connections 128;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Each listener represents the trusted side of a different HA ingress
    # route. Ports 8082/8083 are post-TLS-termination Nabu/Cloudflare shapes;
    # real public TLS remains an external acceptance gate.
    map $server_port $profile_upstream {
        8080 upstream-lan:8081;
        8082 upstream-nabu:8081;
        8083 upstream-cloudflare:8081;
        default upstream-lan:8081;
    }
    map $server_port $profile_name {
        8080 lan;
        8082 nabu-shaped;
        8083 cloudflare-shaped;
        default invalid;
    }
    map $server_port $profile_host {
        8080 ha-lan.invalid;
        8082 ha-nabu.invalid;
        8083 ha-cloudflare.invalid;
        default invalid.invalid;
    }
    map $server_port $profile_proto {
        8080 http;
        8082 https;
        8083 https;
        default invalid;
    }
    map $server_port $profile_cf_ray {
        8083 synthetic-cloudflare-ray;
        default "";
    }

    # A complete 8 MiB v1 chunk must cross every ingress shape without proxy
    # buffering changing replay safety.
    client_max_body_size 8m;

    server {
        listen 8080;
        listen 8082;
        listen 8083;
        server_name _;

        location = /health {
            proxy_set_header Host $profile_host;
            proxy_set_header X-Forwarded-Host $profile_host;
            proxy_set_header X-Forwarded-Proto $profile_proto;
            proxy_set_header X-Transport-Profile $profile_name;
            proxy_pass http://$profile_upstream;
        }

        location = /debug/state {
            proxy_set_header Host $profile_host;
            proxy_set_header X-Forwarded-Host $profile_host;
            proxy_set_header X-Forwarded-Proto $profile_proto;
            proxy_set_header X-Transport-Profile $profile_name;
            proxy_pass http://$profile_upstream;
        }

        location = /api/prompt {
            proxy_http_version 1.1;
            proxy_set_header Host $profile_host;
            proxy_set_header X-Forwarded-Host $profile_host;
            proxy_set_header X-Forwarded-Proto $profile_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Transport-Profile $profile_name;
            proxy_set_header CF-Ray $profile_cf_ray;
            proxy_set_header CF-Connecting-IP $remote_addr;
            proxy_pass http://$profile_upstream;
        }

        location ^~ /api/codex_bridge/ {
            proxy_http_version 1.1;
            proxy_set_header Host $profile_host;
            proxy_set_header X-Forwarded-Host $profile_host;
            proxy_set_header X-Forwarded-Proto $profile_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Transport-Profile $profile_name;
            proxy_set_header CF-Ray $profile_cf_ray;
            proxy_set_header CF-Connecting-IP $remote_addr;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            proxy_pass http://$profile_upstream;
        }

        location = /api/websocket {
            proxy_http_version 1.1;
            proxy_set_header Host $profile_host;
            proxy_set_header X-Forwarded-Host $profile_host;
            proxy_set_header X-Forwarded-Proto $profile_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Transport-Profile $profile_name;
            proxy_set_header CF-Ray $profile_cf_ray;
            proxy_set_header CF-Connecting-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            proxy_pass http://$profile_upstream;
        }

        location / {
            return 404;
        }
    }
}
