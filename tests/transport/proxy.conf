worker_processes 1;

events {
    worker_connections 128;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    server {
        listen 8080;
        server_name _;

        # The browser-facing paths are deliberately relative to the HA origin.
        # This is the proxy behaviour required by Nabu Casa, Cloudflare Tunnel,
        # and conventional reverse proxies: no App address appears in the client.
        location = /health {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://upstream:8081;
        }

        location = /debug/state {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://upstream:8081;
        }

        location = /api/prompt {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://upstream:8081;
        }

        location = /api/websocket {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            proxy_pass http://upstream:8081;
        }

        location / {
            return 404;
        }
    }
}
