name: codex-bridge-transport

x-upstream: &upstream
  image: node:22.14.0-alpine3.21
  command: ["node", "/workspace/e2e.spec.js", "--server"]
  environment:
    TRANSPORT_PORT: "8081"
    TRANSPORT_UPLOAD_CHUNK_BYTES: "8388608"
  volumes:
    - ./e2e.spec.js:/workspace/e2e.spec.js:ro
  read_only: true
  tmpfs:
    - /tmp
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "node -e \"fetch('http://127.0.0.1:8081/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
      ]
    interval: 1s
    timeout: 2s
    retries: 15
  networks:
    - transport

services:
  upstream-lan:
    <<: *upstream

  upstream-nabu:
    <<: *upstream

  upstream-cloudflare:
    <<: *upstream

  proxy:
    image: nginx:1.27.4-alpine3.21
    command: ["nginx", "-g", "pid /tmp/nginx.pid; daemon off;"]
    depends_on:
      upstream-lan:
        condition: service_healthy
      upstream-nabu:
        condition: service_healthy
      upstream-cloudflare:
        condition: service_healthy
    volumes:
      - ./proxy.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # nginx changes ownership before dropping to its unprivileged worker.
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - transport

  e2e:
    image: node:22.14.0-alpine3.21
    command: ["node", "/workspace/remote-path.spec.js"]
    depends_on:
      upstream-lan:
        condition: service_healthy
      upstream-nabu:
        condition: service_healthy
      upstream-cloudflare:
        condition: service_healthy
      proxy:
        condition: service_started
    environment:
      TRANSPORT_UPLOAD_CHUNK_BYTES: "8388608"
    volumes:
      - ./e2e.spec.js:/workspace/e2e.spec.js:ro
      - ./remote-path.spec.js:/workspace/remote-path.spec.js:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - transport

networks:
  transport:
    internal: true
