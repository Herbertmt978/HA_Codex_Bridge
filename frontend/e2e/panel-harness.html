        size_bytes: record.manifest.size_bytes,

        chunk_size: 8 * 1024 * 1024,
        total_chunks: Math.ceil(record.manifest.size_bytes / (8 * 1024 * 1024)),

            headers: { "Content-Type": "text/csv" },

            status: 200,
            headers: { "Content-Type": "application/zip" },
          });
        }

        const createMatch = pathname.match(/^\/api\/codex_bridge\/threads\/([^/]+)\/uploads$/);
        if (createMatch && init.method === "POST") {
          uploadCounter += 1;
          const uploadId = `upl_harness_${uploadCounter}`;
          const record = {
            uploadId,
            threadId: decodeURIComponent(createMatch[1]),
            manifest: JSON.parse(init.body),
            received: new Set(),
            status: "active",
          };
          uploadSessions.set(uploadId, record);
          return jsonResponse(sessionView(record), 201);

        const chunkMatch = pathname.match(/^\/api\/codex_bridge\/threads\/([^/]+)\/uploads\/([^/]+)\/chunks\/(\d+)$/);
        if (chunkMatch && init.method === "PUT") {
          const record = uploadSessions.get(decodeURIComponent(chunkMatch[2]));
          if (!record) return jsonResponse({ message: "Upload missing" }, 404);
          record.received.add(Number(chunkMatch[3]));
          return jsonResponse(sessionView(record));
        }

        const completeMatch = pathname.match(/^\/api\/codex_bridge\/threads\/([^/]+)\/uploads\/([^/]+)\/complete$/);
        if (completeMatch && init.method === "POST") {
          const record = uploadSessions.get(decodeURIComponent(completeMatch[2]));
          if (!record) return jsonResponse({ message: "Upload missing" }, 404);

            attachment_id: `att_${record.uploadId}`,
            filename: record.manifest.filename,
            mime_type: record.manifest.mime_type,
            relative_path: record.manifest.relative_path,
            size_bytes: record.manifest.size_bytes,
          };
          if (thread) thread.attachments = [...thread.attachments, attachment];
          return jsonResponse(attachment, 201);
        }

        const sessionMatch = pathname.match(/^\/api\/codex_bridge\/threads\/([^/]+)\/uploads\/([^/]+)$/);
        if (sessionMatch) {
          const record = uploadSessions.get(decodeURIComponent(sessionMatch[2]));
          if (!record) return jsonResponse({ message: "Upload missing" }, 404);
          if (init.method === "DELETE") record.status = "cancelled";
          return jsonResponse(sessionView(record));
        }

        return new Response("Preview unavailable", {
          status: 200,
          headers: { "Content-Type": "text/plain" },
        });

          event_id: `evt_harness_${threadId}_${nextThreadSequence(threadId)}`,
          thread_id: threadId,
          sequence: nextThreadSequence(threadId),
          event_type: eventType,
          payload: clone(payload),
          timestamp: new Date().toISOString(),
        };
        eventMap[threadId] = [...(eventMap[threadId] || []), event];
        const subscribers = harnessState.threadSubscribers.get(threadId);
        subscribers?.forEach((callback) => callback(clone(event)));
        return event;
      };

          const interaction = interactions.find((item) => item.interaction_id === interactionId);

          pendingInteractionsByThread[threadId] = interactions.filter((item) => item.interaction_id !== interactionId);
          emitThreadEvent(threadId, "interaction.resolved", {
            interaction_id: interactionId,
            status,
          });
          return interaction;
        }
        return null;
      };

            harnessState.subscriptions.push(clone(payload));
            harnessState.calls.push({ kind: "subscribe", payload: clone(payload) });
            if (Array.isArray(payload.scopes) && (payload.scopes.includes("auth") || payload.scopes.includes("runtime"))) {
              harnessState.authSubscribers.add(callback);
              window.setTimeout(emitAuthEvent, 0);
              return () => harnessState.authSubscribers.delete(callback);

            const threadId = payload.thread_id;
            const subscribers = harnessState.threadSubscribers.get(threadId) || new Set();
            subscribers.add(callback);
            harnessState.threadSubscribers.set(threadId, subscribers);
            const events = (eventMap[payload.thread_id] || defaultEvents).filter((item) => item.sequence > (payload.after || 0));
            const timers = events.map((event, index) => window.setTimeout(() => callback(clone(event)), 40 + index * 20));
            return () => {
              timers.forEach((timer) => window.clearTimeout(timer));
              subscribers.delete(callback);
              if (!subscribers.size) harnessState.threadSubscribers.delete(threadId);

                };
              case "codex_bridge/get_status":
                return clone({ ...statusPayload, auth: harnessState.auth });
              case "codex_bridge/list_projects":
                return clone(projects);
              case "codex_bridge/list_threads":
                return clone(Object.values(threadMap));
              case "codex_bridge/get_thread":
                harnessState.selectedThreadId = payload.thread_id;
                return clone(threadMap[payload.thread_id]);
              case "codex_bridge/get_events":
                return clone((eventMap[payload.thread_id] || defaultEvents).filter((item) => item.sequence > (payload.after || 0)));
              case "codex_bridge/list_artifacts":
                return clone(threadMap[payload.thread_id]?.artifacts || []);
              case "codex_bridge/list_pending_interactions": {
                const items = payload.thread_id
                  ? pendingInteractionsByThread[payload.thread_id] || []
                  : Object.values(pendingInteractionsByThread).flat();
                return {
                  items: clone(items),
                  count: items.length,
                  thread_id: payload.thread_id || null,
                };
              }
              case "codex_bridge/update_thread": {
                const thread = threadMap[payload.thread_id];
                if ("model_override" in payload) {
                  thread.model_override = payload.model_override;
                  thread.effective_model = payload.model_override || thread.default_model;
                }
                if ("thinking_override" in payload) {
                  thread.thinking_override = payload.thinking_override;
                  thread.effective_thinking_level = payload.thinking_override || thread.default_thinking_level;
                }
                thread.updated_at = "2026-05-09T10:44:00Z";
                return clone(thread);
              }
              case "codex_bridge/create_workspace_archive": {
                const thread = threadMap[payload.thread_id];
                const artifact = {
                  artifact_id: "art_bundle",
                  filename: "workspace-bundle-20260509-114900.zip",
                  mime_type: "application/zip",
                  stored_path: "artifacts/workspace-bundle-20260509-114900.zip",
                  relative_path: "workspace-bundle-20260509-114900.zip",
                  size_bytes: 18222,
                };
                thread.artifacts = [...thread.artifacts, artifact];
                return clone(artifact);
              }
              case "codex_bridge/browse_paths":
                return { path: "projects", parent_path: "", directories: [{ name: "vba-upgrade", path: "projects/vba-upgrade" }] };
              case "codex_bridge/create_project": {
                const folderName = (payload.name || "New project")
                  .replace(/[<>:"/\\|?*\x00-\x1F]/g, " ")
                  .trim()
                  .replace(/\s+/g, " ") || "Project";
                const project = {
                  project_id: `prj_new_${Date.now()}`,
                  name: payload.name || "New project",
                  root_path: payload.root_path || `projects/${folderName.toLowerCase().replace(/\s+/g, "-")}`,
                  kind: "project",
                  default_model: payload.default_model || statusPayload.model_catalog.default_model,
                  default_thinking_level: payload.default_thinking_level || statusPayload.model_catalog.default_thinking_level,
                  created_at: "2026-05-09T10:45:00Z",
                  updated_at: "2026-05-09T10:45:00Z",
                };
                projects.push(project);
                return clone(project);
              }
              case "codex_bridge/update_project": {
                const project = projects.find((item) => item.project_id === payload.project_id);
                if (project) {
                  project.name = payload.name || project.name;
                  project.root_path = payload.root_path || project.root_path;
                  project.default_model = payload.default_model || project.default_model;
                  project.default_thinking_level = payload.default_thinking_level || project.default_thinking_level;
                }
                return clone(project);
              }
              case "codex_bridge/create_folder":
                return { path: payload.path };
              case "codex_bridge/get_auth_status":
                return clone(harnessState.auth);
              case "codex_bridge/start_auth_login":
                harnessState.auth = {
                  ...harnessState.auth,
                  revision: ++harnessState.authRevision,
                  state: "login_running",
                  busy: true,
                  auth_required: true,
                  message: "Use this code to continue with ChatGPT.",
                  verification_uri: "https://auth.openai.com/codex/device",
                  login_url: "https://auth.openai.com/codex/device",
                  user_code: "HOME-ASSISTANT",
                };
                emitAuthEvent();
                return clone(harnessState.auth);
              case "codex_bridge/cancel_auth_login":
                harnessState.auth = {
                  ...harnessState.auth,
                  revision: ++harnessState.authRevision,
                  state: "signed_out",
                  busy: false,
                  auth_required: true,
                  message: "Sign-in cancelled.",
                  verification_uri: null,
                  login_url: null,
                  user_code: null,
                };
                emitAuthEvent();
                return clone(harnessState.auth);
              case "codex_bridge/logout_auth":
                harnessState.auth = {
                  ...harnessState.auth,
                  revision: ++harnessState.authRevision,
                  state: "signed_out",
                  busy: false,
                  auth_required: true,
                  message: "Signed out of ChatGPT.",
                  verification_uri: null,
                  login_url: null,
                  user_code: null,
                  plan_type: "Unknown",
                };
                emitAuthEvent();
                return clone(harnessState.auth);
              case "codex_bridge/create_thread": {
                harnessState.threadCounter += 1;
                const project = projects.find((item) => item.project_id === payload.project_id) || projects[0];
                const threadId = `thr_new_${harnessState.threadCounter}`;
                threadMap[threadId] = {
                  thread_id: threadId,
                  project_id: project.project_id,
                  title: payload.title,
                  workspace_id: `ws_new_${harnessState.threadCounter}`,
                  workspace_path: project.root_path,
                  status: "idle",
                  mode: payload.mode || "full-auto",
                  codex_session_id: null,
                  active_run_id: null,
                  last_error: null,
                  attachments: [],
                  artifacts: [],
                  model_override: null,
                  thinking_override: null,
                  created_at: "2026-05-09T10:45:00Z",
                  updated_at: "2026-05-09T10:45:00Z",
                  archived_at: null,
                  project_name: project.name,
                  project_root_path: project.root_path,
                  project_kind: project.kind,
                  default_model: project.default_model,
                  default_thinking_level: project.default_thinking_level,
                  effective_model: project.default_model,
                  effective_thinking_level: project.default_thinking_level,
                };
                return clone(threadMap[threadId]);
              }
              case "codex_bridge/cancel_run": {
                const thread = threadMap[payload.thread_id];
                if (thread) {
                  thread.status = "idle";
                  thread.active_run_id = null;
                  thread.last_error = "Run cancelled";
                }
                return { run_id: "run_22", thread_id: payload.thread_id, status: "cancelled" };
              }
              case "codex_bridge/archive_thread": {
                const thread = threadMap[payload.thread_id];
                if (thread) {
                  thread.archived_at = "2026-05-09T10:45:00Z";
                }
                return clone(thread);
              }
              case "codex_bridge/restore_thread": {
                const thread = threadMap[payload.thread_id];
                if (thread) {
                  thread.archived_at = null;
                }
                return clone(thread);
              }
              case "codex_bridge/delete_thread":
                delete threadMap[payload.thread_id];
                return {};
              case "codex_bridge/archive_project": {
                const project = projects.find((item) => item.project_id === payload.project_id);
                if (project) {
                  project.archived_at = "2026-05-09T10:45:00Z";
                }
                return clone(project);
              }
              case "codex_bridge/restore_project": {
                const project = projects.find((item) => item.project_id === payload.project_id);
                if (project) {
                  project.archived_at = null;
                }
                return clone(project);
              }
              case "codex_bridge/delete_project":
                {
                  const index = projects.findIndex((item) => item.project_id === payload.project_id);
                  if (index >= 0) {
                    projects.splice(index, 1);
                  }
                }
                return {};
              case "codex_bridge/decide_interaction": {
                const statuses = { accept: "accepted", decline: "declined", cancel: "cancelled" };
                const status = statuses[payload.decision];
                const interaction = removeInteraction(payload.interaction_id, status);
                if (!interaction) throw new Error("interaction_stale");
                return {
                  interaction_id: interaction.interaction_id,
                  thread_id: interaction.thread_id,
                  status,
                  client_request_id: payload.client_request_id,
                };
              }
              case "codex_bridge/answer_interaction": {
                const interaction = removeInteraction(payload.interaction_id, "answered");
                if (!interaction) throw new Error("interaction_stale");
                return {
                  interaction_id: interaction.interaction_id,
                  thread_id: interaction.thread_id,
                  status: "answered",
                  client_request_id: payload.client_request_id,
                };
              }
              case "codex_bridge/send_prompt": {
                const requestId = payload.client_request_id || "prompt-without-id";
                if (harnessState.dropNextPromptResponse) {
                  harnessState.dropNextPromptResponse = false;
                  throw new Error("Bridge response was lost");
                }
                if (!harnessState.publishedPromptRequestIds.has(requestId)) {
                  harnessState.publishedPromptRequestIds.add(requestId);
                  emitThreadEvent(payload.thread_id, "message.created", {
                    role: "user",
                    text: payload.prompt,
                    client_request_id: payload.client_request_id,
                  });
                }
                return { accepted: true, client_request_id: payload.client_request_id };
              }
              default:
                throw new Error(`Unhandled WS call: ${payload.type}`);
            }
          },
        },
      };

      const panel = document.querySelector("codex-bridge-panel");
      panel.hass = hass;
      panel.panel = { config: { title: "Codex Bridge" } };
    </script>
  </body>
</html>
