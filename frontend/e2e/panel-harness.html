            headers: { "Content-Type": "text/csv" },

            status: 200,
            headers: { "Content-Type": "application/zip" },
          });
        }

        if (createMatch && init.method === "POST") {
          uploadCounter += 1;
          const uploadId = `upl_harness_${uploadCounter}`;
          const record = {
            uploadId,
            threadId: decodeURIComponent(createMatch[1]),
            manifest: JSON.parse(init.body),
            received: new Set(),
            status: "active",

          return jsonResponse(sessionView(record), 201);

        const chunkMatch = pathname.match(/^\/api\/codex_bridge\/threads\/([^/]+)\/uploads\/([^/]+)\/chunks\/(\d+)$/);
        if (chunkMatch && init.method === "PUT") {
          const record = uploadSessions.get(decodeURIComponent(chunkMatch[2]));
          if (!record) return jsonResponse({ message: "Upload missing" }, 404);
          record.received.add(Number(chunkMatch[3]));
          return jsonResponse(sessionView(record));
        }

          const record = uploadSessions.get(decodeURIComponent(completeMatch[2]));

            relative_path: record.manifest.relative_path,
            size_bytes: record.manifest.size_bytes,

          return jsonResponse(attachment, 201);
        }

        const sessionMatch = pathname.match(/^\/api\/codex_bridge\/threads\/([^/]+)\/uploads\/([^/]+)$/);

          const record = uploadSessions.get(decodeURIComponent(sessionMatch[2]));
          if (!record) return jsonResponse({ message: "Upload missing" }, 404);

          return jsonResponse(sessionView(record));

          status: 200,
          headers: { "Content-Type": "text/plain" },

                return {};
              case "codex_bridge/archive_project": {
                const project = projects.find((item) => item.project_id === payload.project_id);
                if (project) {
                  project.archived_at = "2026-05-09T10:45:00Z";
                }
                return clone(project);
              }
              case "codex_bridge/restore_project": {
                const project = projects.find((item) => item.project_id === payload.project_id);
                if (project) {
                  project.archived_at = null;
                }
                return clone(project);
              }
              case "codex_bridge/delete_project":
                {
                  const index = projects.findIndex((item) => item.project_id === payload.project_id);
                  if (index >= 0) {
                    projects.splice(index, 1);
                  }
                }
                return {};
              case "codex_bridge/send_prompt":
                return {};
              default:
                throw new Error(`Unhandled WS call: ${payload.type}`);
            }
          },
        },
      };

      const panel = document.querySelector("codex-bridge-panel");
      panel.hass = hass;
      panel.panel = { config: { title: "Codex Bridge" } };
    </script>
  </body>
</html>
