version: 2
# Routine version updates share one review and notification thread each week.
# Security alerts remain governed by GitHub's separate security-update settings.
multi-ecosystem-groups:
  weekly-maintenance:
    schedule:
      interval: weekly

updates:
  - package-ecosystem: github-actions
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: weekly-maintenance

  - package-ecosystem: npm
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: weekly-maintenance

  - package-ecosystem: pip
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: weekly-maintenance
    ignore:
      # pytest-homeassistant-custom-component==0.13.346 requires pytest==9.0.3.
      - dependency-name: "pytest"
        versions:
          - ">=9.1.0"

  - package-ecosystem: pip
    directory: "/bridge_service"
    patterns:
      - "*"
    multi-ecosystem-group: weekly-maintenance
    ignore:
      # pytest-homeassistant-custom-component==0.13.346 requires pytest==9.0.3.
      - dependency-name: "pytest"
        versions:
          - ">=9.1.0"

  - package-ecosystem: docker
    directory: "/codex_bridge_app"
    patterns:
      - "*"
    multi-ecosystem-group: weekly-maintenance
