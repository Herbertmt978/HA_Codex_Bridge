name: Build App

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/build-app.yml"
      - ".github/workflows/release.yml"
      - "bridge_service/**"
      - "codex_bridge_app/**"
      - "scripts/**"
  workflow_dispatch:
  workflow_call:
    inputs:
      publish:
        description: Publish the immutable App image from main.
        required: true
        type: boolean
      expected_sha:
        description: Exact main commit to build.
        required: true
        type: string

permissions: {}

concurrency:
  group: build-app-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ inputs.publish != true }}

env:
  CONFIG_PATH: codex_bridge_app/config.yaml
  GENERIC_IMAGE: ghcr.io/herbertmt978/ha-codex-bridge-app
  PER_ARCH_IMAGE: ghcr.io/herbertmt978/amd64-ha-codex-bridge-app

jobs:
  verify:
    name: Build amd64 App without publishing
    if: inputs.publish != true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.2"

      - name: Read exact config.yaml version
        id: config_version
        shell: bash
        run: |
          version="$(python - <<'PY'
          from pathlib import Path
          import re

          text = Path("codex_bridge_app/config.yaml").read_text(encoding="utf-8")
          matches = re.findall(r'(?m)^version:\s*["\x27]?([0-9]+\.[0-9]+\.[0-9]+)["\x27]?\s*$', text)
          if len(matches) != 1:
              raise SystemExit("config.yaml must contain one stable App version")
          print(matches[0])
          PY
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check release metadata and verified Codex lock
        run: |
          python scripts/sync_app_release.py --check
          python scripts/update_codex_lock.py --check codex_bridge_app/codex-release.json

      - name: Stage reproducible amd64 context
        run: python scripts/stage_app_context.py --arch amd64

      - name: Build with the official Home Assistant builder
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          arch: amd64
          container-registry-password: not-used-with-push-disabled
          context: ./.build/app-context
          cosign: "false"
          image: ${{ env.PER_ARCH_IMAGE }}
          image-tags: ${{ steps.config_version.outputs.version }}
          labels: |
            io.hass.type=app
            io.hass.name=Codex Bridge
            io.hass.description=Run Codex privately inside Home Assistant
          push: "false"
          version: ${{ steps.config_version.outputs.version }}

  publish:
    name: Publish signed amd64 App image
    if: inputs.publish == true && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # Fulcio OIDC identity for keyless image signing.
      packages: write # Push the versioned amd64 image to GHCR.
    outputs:
      version: ${{ steps.config_version.outputs.version }}
    steps:
      - name: Check out exact accepted main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.expected_sha }}

      - name: Require the requested commit to be current main
        shell: bash
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"
          test "$(git ls-remote origin refs/heads/main | cut -f1)" = "${EXPECTED_SHA}"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.2"

      - name: Read exact config.yaml version
        id: config_version
        shell: bash
        run: |
          version="$(python - <<'PY'
          from pathlib import Path
          import re

          text = Path("codex_bridge_app/config.yaml").read_text(encoding="utf-8")
          matches = re.findall(r'(?m)^version:\s*["\x27]?([0-9]+\.[0-9]+\.[0-9]+)["\x27]?\s*$', text)
          if len(matches) != 1:
              raise SystemExit("config.yaml must contain one stable App version")
          print(matches[0])
          PY
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check release metadata and verified Codex lock
        run: |
          python scripts/sync_app_release.py --check
          python scripts/update_codex_lock.py --check codex_bridge_app/codex-release.json

      - name: Log in for immutable-tag preflight
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Refuse to overwrite an existing App version
        shell: bash
        env:
          VERSION: ${{ steps.config_version.outputs.version }}
        run: |
          if docker manifest inspect "${GENERIC_IMAGE}:${VERSION}" >/dev/null 2>&1; then
            echo "The generic ${VERSION} tag already exists; bump the App version." >&2
            exit 1
          fi
          if docker manifest inspect "${PER_ARCH_IMAGE}:${VERSION}" >/dev/null 2>&1; then
            echo "The amd64 ${VERSION} tag already exists; bump the App version." >&2
            exit 1
          fi

      - name: Stage reproducible amd64 context
        run: python scripts/stage_app_context.py --arch amd64

      - name: Build, publish, and keylessly sign the amd64 image
        id: build
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          arch: amd64
          container-registry-password: ${{ github.token }}
          context: ./.build/app-context
          cosign: "true"
          image: ${{ env.PER_ARCH_IMAGE }}
          image-tags: ${{ steps.config_version.outputs.version }}
          labels: |
            io.hass.type=app
            io.hass.name=Codex Bridge
            io.hass.description=Run Codex privately inside Home Assistant
          push: "true"
          version: ${{ steps.config_version.outputs.version }}

  manifest:
    name: Publish, attest, and verify generic App manifest
    needs: publish
    if: inputs.publish == true && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      attestations: write # Record provenance for the immutable manifest.
      contents: read
      id-token: write # Fulcio OIDC identity for manifest and SBOM signatures.
      packages: write # Publish the manifest and OCI attestations to GHCR.
    steps:
      - name: Install pinned Cosign verifier
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Publish and keylessly sign the generic amd64 manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: '["amd64"]'
          container-registry-password: ${{ github.token }}
          image-name: ha-codex-bridge-app
          image-tags: ${{ needs.publish.outputs.version }}
          registry-prefix: ghcr.io/herbertmt978

      - name: Resolve and inspect the published digest
        id: digest
        shell: bash
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          docker buildx imagetools inspect \
            "${GENERIC_IMAGE}:${VERSION}" \
            --format '{{json .Manifest}}' > manifest.json
          digest="$(jq -r '.digest' manifest.json)"
          [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]
          docker buildx imagetools inspect "${GENERIC_IMAGE}@${digest}" > manifest-inspect.txt
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "image-ref=${GENERIC_IMAGE}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Generate SPDX JSON SBOM from the immutable digest
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: codex-bridge-app-${{ needs.publish.outputs.version }}-sbom
          format: spdx-json
          image: ${{ steps.digest.outputs.image-ref }}
          output-file: sbom.spdx.json
          upload-artifact: "false"

      - name: Attach a keyless SBOM attestation
        shell: bash
        env:
          IMAGE_REF: ${{ steps.digest.outputs.image-ref }}
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE_REF}"

      - name: Publish GitHub build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          push-to-registry: true
          subject-digest: ${{ steps.digest.outputs.digest }}
          subject-name: ${{ env.GENERIC_IMAGE }}

      - name: Verify GitHub build provenance by digest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ steps.digest.outputs.image-ref }}
        run: |
          gh attestation verify "oci://${IMAGE_REF}" \
            --bundle-from-oci \
            --format json \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/build-app.yml" \
            > provenance-verification.json

      - name: Verify signature and SBOM attestation by digest
        shell: bash
        env:
          IMAGE_REF: ${{ steps.digest.outputs.image-ref }}
        run: |
          identity='^https://github.com/Herbertmt978/(HA_Codex_Bridge|ha-codex-bridge)/.github/workflows/(build-app|release)\.yml@refs/heads/main$'
          issuer='https://token.actions.githubusercontent.com'
          cosign verify \
            --certificate-identity-regexp "${identity}" \
            --certificate-oidc-issuer "${issuer}" \
            "${IMAGE_REF}" > image-signature.json
          cosign verify-attestation \
            --certificate-identity-regexp "${identity}" \
            --certificate-oidc-issuer "${issuer}" \
            --type spdxjson \
            "${IMAGE_REF}" > sbom-attestation.json

      - name: Preserve release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: codex-bridge-app-${{ needs.publish.outputs.version }}-evidence
          path: |
            image-signature.json
            manifest-inspect.txt
            manifest.json
            provenance-verification.json
            sbom-attestation.json
            sbom.spdx.json
          retention-days: 90

      - name: Record immutable release coordinates
        shell: bash
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          {
            echo "### Codex Bridge App ${VERSION}"
            echo
            echo "Published and verified \`${GENERIC_IMAGE}@${DIGEST}\`."
          } >> "$GITHUB_STEP_SUMMARY"
