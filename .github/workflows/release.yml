name: Release Home Assistant App

on:
  push:
    branches: [main]
    paths:
      - "codex_bridge_app/config.yaml"
  workflow_dispatch:
    inputs:
      head_sha:
        description: Optional exact current main commit SHA to release.
        required: false
        type: string

permissions: {}

concurrency:
  group: release-app-main
  cancel-in-progress: false

jobs:
  validate:
    name: Lock the current main release input
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      expected_sha: ${{ steps.expected.outputs.expected_sha }}
    steps:
      - name: Check out the triggering revision without credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Require one exact current main commit
        id: expected
        shell: bash
        env:
          REQUESTED_HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          expected_sha="${REQUESTED_HEAD_SHA:-${GITHUB_SHA}}"
          if [[ ! "${expected_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "head_sha must be a full lowercase Git commit SHA" >&2
            exit 1
          fi
          main_sha="$(git ls-remote origin refs/heads/main | awk 'NR == 1 { print $1 }')"
          test -n "${main_sha}"
          test "${expected_sha}" = "${main_sha}"
          echo "expected_sha=${expected_sha}" >> "$GITHUB_OUTPUT"

      - name: Check out the exact accepted main commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ steps.expected.outputs.expected_sha }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Validate synchronized App release metadata and lock
        run: |
          python scripts/sync_app_release.py --check
          python scripts/update_codex_lock.py --check codex_bridge_app/codex-release.json

      - name: Require the changelog to lead with the released App version
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          config = Path("codex_bridge_app/config.yaml").read_text(encoding="utf-8")
          changelog = Path("codex_bridge_app/CHANGELOG.md").read_text(encoding="utf-8")
          versions = re.findall(
              r'(?m)^version:\s*["\x27]?([0-9]+\.[0-9]+\.[0-9]+)["\x27]?\s*$',
              config,
          )
          headings = re.findall(r'(?m)^## ([0-9]+\.[0-9]+\.[0-9]+)\s*$', changelog)
          if len(versions) != 1 or not headings or headings[0] != versions[0]:
              raise SystemExit("App config.yaml and CHANGELOG.md release versions differ")
          PY

  publish:
    name: Publish the verified App image
    needs: validate
    uses: ./.github/workflows/build-app.yml
    with:
      publish: true
      expected_sha: ${{ needs.validate.outputs.expected_sha }}
    permissions:
      attestations: write # Let the reusable builder record provenance.
      contents: read
      id-token: write # Let the reusable builder sign images and SBOMs.
      packages: write # Let the reusable builder publish GHCR objects.

  release-integration:
    name: Publish the paired Integration release
    needs: [validate, publish]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Create only the verified, exact-main Integration tag/release.
    steps:
      - name: Check out the exact published main commit without credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ needs.validate.outputs.expected_sha }}

      - name: Require the checkout to remain the published App source
        shell: bash
        env:
          EXPECTED_SHA: ${{ needs.validate.outputs.expected_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Read the canonical synchronized release version
        id: version
        shell: bash
        run: |
          version="$(python - <<'PY'
          from pathlib import Path
          import re

          text = Path("codex_bridge_app/config.yaml").read_text(encoding="utf-8")
          matches = re.findall(r'(?m)^version:\s*["\x27]?([0-9]+\.[0-9]+\.[0-9]+)["\x27]?\s*$', text)
          if len(matches) != 1:
              raise SystemExit("config.yaml must contain one stable App version")
          print(matches[0])
          PY
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create or verify the exact paired Integration release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ needs.validate.outputs.expected_sha }}
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          set -euo pipefail
          python scripts/publish_integration_release.py
